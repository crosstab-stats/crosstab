<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CrossTab</title>
    <meta name="theme-color" content="#2c3e50" />
    <link rel="manifest" href="manifest.json" />

    <!--
      Cross-Origin-Isolation shim. MUST run before anything that needs
      SharedArrayBuffer (i.e. before WebR loads). On hosts that already send
      COOP/COEP headers (Cloudflare Pages) this is a no-op. See sw.js.
      Loaded as a classic script on purpose: it inspects document.currentScript.
    -->
    <script src="sw.js"></script>

    <style>
      :root {
        --bar: #2c3e50;
        --bar-fg: #ecf0f1;
        --accent: #2980b9;
        --line: #d8dde2;
        --bg: #f7f8fa;
        --panel: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font: 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #1a1a1a;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        /* Respect iPad safe areas in standalone PWA mode. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      /* --- header + menubar --- */
      header {
        background: var(--bar);
        color: var(--bar-fg);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 12px;
        min-height: 44px; /* comfortable touch target on iPad */
      }
      .brand { font-weight: 700; letter-spacing: .04em; }
      nav.menubar { display: flex; gap: 2px; position: relative; }
      .menu { position: relative; }
      .menu__button {
        background: transparent; color: var(--bar-fg); border: 0;
        font: inherit; padding: 10px 12px; cursor: pointer; border-radius: 4px;
      }
      .menu__button:hover, .menu__button[aria-expanded="true"] { background: rgba(255,255,255,.15); }
      .menu__panel {
        position: absolute; top: 100%; left: 0; z-index: 50;
        background: var(--panel); color: #1a1a1a; min-width: 240px;
        border: 1px solid var(--line); border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0,0,0,.18); padding: 6px;
      }
      .menu__item {
        display: block; width: 100%; text-align: left; background: transparent;
        border: 0; font: inherit; padding: 9px 12px; border-radius: 4px; cursor: pointer;
      }
      .menu__item:hover { background: #eef5fb; }
      .menu__group { padding: 4px 0; }
      .menu__group-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: #7a8590; padding: 6px 12px 2px;
      }

      /* --- main layout --- */
      main { flex: 1; display: flex; min-height: 0; }
      .sidebar {
        width: 240px; flex: 0 0 240px; background: var(--panel);
        border-right: 1px solid var(--line); overflow-y: auto; padding: 12px;
      }
      .sidebar__title { font-size: 12px; text-transform: uppercase; color: #7a8590; margin: 0 0 8px; }
      .sidebar__list { list-style: none; margin: 0; padding: 0; }
      .sidebar__var {
        display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
        width: 100%; text-align: left; background: transparent; border: 1px solid transparent;
        border-radius: 6px; padding: 8px 10px; cursor: pointer; margin-bottom: 2px;
      }
      .sidebar__var:hover { background: #f0f3f6; }
      .sidebar__var[aria-pressed="true"] { background: #e6f0fa; border-color: var(--accent); }
      .sidebar__var-label { font-weight: 600; }
      .sidebar__var-name { font: 12px ui-monospace, Menlo, monospace; color: #7a8590; }

      .results { flex: 1; overflow-y: auto; background: var(--bg); }

      /* --- footer / status --- */
      footer {
        border-top: 1px solid var(--line); background: var(--panel);
        padding: 6px 12px; font-size: 12px; color: #5a6470;
      }

      /* --- analysis dialogs (rendered by plugins) --- */
      .ct-dialog {
        border: 1px solid var(--line); border-radius: 10px; padding: 0;
        box-shadow: 0 16px 48px rgba(0,0,0,.25); max-width: 420px; width: 92vw;
      }
      .ct-dialog::backdrop { background: rgba(0,0,0,.35); }
      .ct-dialog__form { padding: 20px; }
      .ct-dialog__title { margin: 0 0 4px; font-size: 18px; }
      .ct-dialog__hint { margin: 0 0 12px; color: #5a6470; }
      .ct-dialog__vars { list-style: none; margin: 0 0 16px; padding: 0; max-height: 40vh; overflow-y: auto; }
      .ct-dialog__vars label {
        display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer;
      }
      .ct-dialog__vars label:hover { background: #f0f3f6; }
      .ct-dialog__vars code { color: #7a8590; font-size: 12px; }
      .ct-dialog__buttons { display: flex; justify-content: flex-end; gap: 8px; margin: 0; padding: 0; }
      .ct-dialog__buttons button {
        font: inherit; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--line);
        background: #fff; cursor: pointer;
      }
      .ct-dialog__primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
  </head>

  <body>
    <header>
      <span class="brand">CrossTab</span>
      <nav class="menubar" id="menubar" aria-label="Main menu"></nav>
    </header>

    <main>
      <aside class="sidebar" id="sidebar" aria-label="Variables"></aside>
      <section class="results" id="results" aria-label="Results" aria-live="polite"></section>
    </main>

    <footer><span id="status">Starting…</span></footer>

    <script type="module">
      import { boot } from './core/app.js';

      boot({
        menubar: document.getElementById('menubar'),
        sidebar: document.getElementById('sidebar'),
        results: document.getElementById('results'),
        status: document.getElementById('status'),
      }).catch((err) => {
        console.error('CrossTab failed to start', err);
        document.getElementById('status').textContent = 'Failed to start: ' + err.message;
      });
    </script>
  </body>
</html>
