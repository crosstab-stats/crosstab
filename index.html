<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CrossTab</title>
    <meta name="theme-color" content="#2c3e50" />
    <link rel="manifest" href="manifest.json" />
    <!-- iOS uses apple-touch-icon (not the manifest) for the Home Screen icon. -->
    <link rel="apple-touch-icon" href="vendor/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="vendor/icon-192.png" />

    <!--
      Cross-Origin-Isolation shim. MUST run before anything that needs
      SharedArrayBuffer (i.e. before WebR loads). On hosts that already send
      COOP/COEP headers (Cloudflare Pages) this is a no-op. See sw.js.
      Loaded as a classic script on purpose: it inspects document.currentScript.
    -->
    <script src="sw.js"></script>

    <style>
      :root {
        --bar: #2c3e50;
        --bar-fg: #ecf0f1;
        --accent: #2980b9;
        --line: #d8dde2;
        --bg: #f7f8fa;
        --panel: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font: 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #1a1a1a;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        /* Never let content (e.g. a full menubar) scroll the whole page sideways;
           inner panes keep their own scrollbars. */
        overflow-x: hidden;
        /* Respect iPad safe areas in standalone PWA mode. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      /* --- header + menubar --- */
      header {
        background: var(--bar);
        color: var(--bar-fg);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 12px;
        min-height: 44px; /* comfortable touch target on iPad */
      }
      .brand { font-weight: 700; letter-spacing: .04em; }
      /* Wrap to additional rows when there are many menus, rather than overflowing
         the header (which used to scroll the whole window sideways). min-width:0
         lets it shrink within the header flex row. */
      nav.menubar { display: flex; flex-wrap: wrap; gap: 2px; position: relative; flex: 1 1 auto; min-width: 0; }
      .menu { position: relative; }
      .menu__button {
        background: transparent; color: var(--bar-fg); border: 0;
        font: inherit; padding: 10px 12px; cursor: pointer; border-radius: 4px;
      }
      .menu__button:hover, .menu__button[aria-expanded="true"] { background: rgba(255,255,255,.15); }
      .menu__panel {
        position: absolute; top: 100%; left: 0; z-index: 50;
        background: var(--panel); color: #1a1a1a; min-width: 240px;
        border: 1px solid var(--line); border-radius: 6px;
        box-shadow: 0 8px 24px rgba(0,0,0,.18); padding: 6px;
        /* A long menu (e.g. Regression) scrolls within itself instead of growing
           the page and scrolling the whole window. */
        max-height: calc(100vh - 52px); overflow-y: auto;
      }
      .menu__item {
        display: block; width: 100%; text-align: left; background: transparent;
        border: 0; font: inherit; padding: 9px 12px; border-radius: 4px; cursor: pointer;
      }
      .menu__item:hover { background: #eef5fb; }
      .menu__group { padding: 4px 0; }
      .menu__group-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: #7a8590; padding: 6px 12px 2px;
      }

      /* --- main layout --- */
      main { flex: 1; display: flex; min-height: 0; }
      .sidebar {
        width: 240px; flex: 0 0 240px; background: var(--panel);
        border-right: 1px solid var(--line); overflow-y: auto; padding: 12px;
      }
      /* sidebar = project manager: active project + its datasets, other projects,
         building blocks */
      .proj__head { display: flex; align-items: center; gap: 4px; margin: 0 0 10px; }
      .proj__name { flex: 1; min-width: 0; font-weight: 700; font-size: 14px; color: #1a1a1a; word-break: break-word; }
      .proj__sub { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7a8590; margin: 0 0 6px; }
      .proj__sub--zone { margin-top: 18px; padding-top: 10px; border-top: 1px solid var(--line); }
      .proj__empty { font-size: 12px; color: #9aa3ab; padding: 4px 8px; }
      .proj__ds-link {
        font: 11px ui-monospace, Menlo, monospace; color: var(--accent);
        background: #e6f0fa; border-radius: 4px; padding: 0 5px;
      }
      /* a linked dataset whose block has a newer version — click to pull */
      .proj__ds-update {
        font: 11px ui-monospace, Menlo, monospace; color: #fff;
        background: var(--accent); border: 0; border-radius: 4px;
        padding: 1px 6px; cursor: pointer;
      }
      .proj__ds-update:hover { background: #1f6391; }
      .proj__drop { outline: 2px dashed var(--accent); outline-offset: -2px; background: #f0f7ff; border-radius: 6px; }
      .proj__datasets { list-style: none; margin: 0 0 10px; padding: 0; }
      .proj__ds {
        display: flex; align-items: center; gap: 6px; padding: 7px 8px;
        border-radius: 6px; border: 1px solid transparent; cursor: pointer; margin-bottom: 2px;
      }
      .proj__ds:hover { background: #f0f3f6; }
      .proj__ds--active { background: #e6f0fa; border-color: var(--accent); }
      .proj__ds-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
      .proj__ds-rows { font: 12px ui-monospace, Menlo, monospace; color: #7a8590; }
      /* row action icons (✎ rename, ✕ remove) — visible, darken on hover */
      .proj__ds-x { border: 0; background: none; color: #7a8590; cursor: pointer; font-size: 12px; padding: 0 3px; border-radius: 4px; }
      .proj__ds-x:hover:not(:disabled) { color: #1a1a1a; background: #dfe5ea; }
      .proj__ds-x:disabled { opacity: .3; cursor: default; } /* greyed, still visible */
      .proj__ds-edit { flex: 1; min-width: 0; font: inherit; padding: 2px 4px; border: 1px solid var(--accent); border-radius: 4px; }
      .proj__add {
        width: 100%; font: inherit; font-size: 13px; padding: 6px;
        border: 1px dashed var(--line); border-radius: 6px; background: #fff; color: #5a6470; cursor: pointer;
      }
      .proj__add:hover { background: #eef5fb; color: #1a1a1a; }

      /* workspace: tabbed main area (Data / Variables / Output) */
      /* min-width:0 so this flex item clips its wide grid instead of expanding to
         the table's full width (which would defeat column virtualisation). */
      .workspace { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
      .tabs {
        display: flex; gap: 2px; background: var(--panel);
        border-bottom: 1px solid var(--line); padding: 0 8px; flex: none;
      }
      .tab {
        background: transparent; border: 0; border-bottom: 2px solid transparent;
        font: inherit; padding: 9px 14px; cursor: pointer; color: #5a6470;
      }
      .tab:hover { color: #1a1a1a; }
      .tab[aria-selected="true"] { color: #1a1a1a; border-bottom-color: var(--accent); font-weight: 600; }
      .tab-action {
        margin-left: auto; align-self: center; background: transparent;
        border: 1px solid var(--line); border-radius: 6px; font: inherit; font-size: 13px;
        padding: 4px 10px; cursor: pointer; color: #5a6470;
      }
      .tab-action:hover { background: #eef5fb; color: #1a1a1a; }
      .tab-action[hidden] { display: none; }
      .view { flex: 1; overflow: auto; min-height: 0; min-width: 0; }
      /* The data-grid panel lays out as a flex column (toolbar + scroller). A
         class (not inline style) so `.view[hidden]` still wins and hides it. */
      .ct-gridhost { display: flex; flex-direction: column; overflow: hidden; }
      .view[hidden] { display: none; }

      /* R Console tab */
      .rconsole { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
      .rc-varsbar {
        flex: none; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
        border-bottom: 1px solid var(--line); background: var(--panel);
      }
      .rc-filter {
        flex: none; width: 140px; font: inherit; font-size: 13px; padding: 4px 8px;
        border: 1px solid var(--line); border-radius: 6px;
      }
      /* Single-line, horizontally scrolling — matches the data grid headers so a
         wide file (GSS) stays a tidy strip instead of a wall of wrapped rows. */
      .rc-vars {
        flex: 1; min-width: 0; display: flex; flex-wrap: nowrap; gap: 14px;
        overflow-x: auto; overflow-y: hidden; white-space: nowrap; padding-bottom: 2px;
      }
      .rc-var { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; white-space: nowrap; flex: none; }
      .rc-vars__empty { color: #888; font-style: italic; font-size: 13px; }
      .rc-info { flex: none; padding: 8px 12px; border-bottom: 1px solid var(--line); font-size: 12.5px; color: #444; background: #fafbfc; }
      .rc-info__line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 2px 0; }
      .rc-info__k { color: #7a8590; }
      .rc-vars-info { font-family: ui-monospace, Menlo, Consolas, monospace; color: #1d2733; }
      .rc-libs-info { font-family: ui-monospace, Menlo, Consolas, monospace; color: #1d2733; flex: 1; min-width: 0; }
      .rc-lib-add { font: inherit; font-size: 12px; padding: 3px 8px; border: 1px solid var(--line); border-radius: 6px; width: 130px; }
      /* The terminal is one scroller; the prompt flows as the last line, right
         after the latest output (like the webR/RStudio console) rather than being
         pinned to the bottom of the pane. */
      .rc-term {
        flex: 1; min-height: 0; overflow-y: auto; padding: 10px 12px;
        white-space: pre-wrap; word-break: break-word; cursor: text;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12.5px; line-height: 1.45;
      }
      .rc-term > div { margin: 0 0 2px; }
      .rc-cmd { color: #2563a8; }
      .rc-result { color: #1a1a1a; }
      .rc-err { color: #b3201a; }
      .rc-note { color: #7a8590; font-style: italic; }
      .rc-plot {
        display: block; max-width: 100%; max-height: 360px; height: auto; width: auto;
        margin: 6px 0 8px; border: 1px solid var(--line); border-radius: 4px; background: #fff;
      }
      .rc-prompt { display: flex; align-items: flex-start; gap: 6px; }
      .rc-caret { color: var(--accent); font-weight: 700; }
      .rc-input {
        flex: 1; border: 0; outline: none; background: transparent; font: inherit; color: #1a1a1a;
        resize: none; overflow-y: auto; line-height: 1.45; padding: 0; max-height: 160px;
      }
      .rc-input:disabled { color: #aaa; }
      .results { background: var(--bg); }

      /* data grid toolbar (column filter + selection count), above the scroller */
      .grid-toolbar {
        display: flex; align-items: center; gap: 12px; flex: none;
        padding: 6px 8px; border-bottom: 1px solid var(--line); background: var(--panel);
      }
      .grid-filter {
        font: inherit; padding: 5px 8px; border: 1px solid var(--line);
        border-radius: 6px; min-width: 200px;
      }
      .grid-selcount { font-size: 12px; color: #7a8590; }
      .grid-scroll { flex: 1; overflow: auto; min-height: 0; min-width: 0; }
      /* column header: a selection checkbox + an ellipsised label */
      .colhead { display: flex; align-items: center; gap: 6px; cursor: pointer; overflow: hidden; }
      .colhead__check { flex: none; margin: 0; }
      .colhead__label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* data grid (Data View) — 2-D virtualised, fixed column widths */
      /* border-collapse:SEPARATE (not collapse): with collapse, a sticky header's
         borders are shared with the first row, so the seam bleeds (data peeking
         through) and the header's bottom edge gets clipped. Separate borders move
         with each cell, so the sticky header stays opaque. Cells carry only
         right+bottom borders to avoid doubled 2px lines; outer top/left edges are
         added to the header / first column. */
      .grid { border-collapse: separate; border-spacing: 0; font: 13px/1 system-ui, sans-serif; }
      .grid th, .grid td {
        border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
        padding: 5px 8px; height: 28px;
        width: 120px; max-width: 120px; box-sizing: border-box;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left;
      }
      /* Header above body (z2 > data z0); sits over the row-number column too. The
         top border gives the grid its top edge (cells only carry bottom borders). */
      .grid thead th {
        position: sticky; top: 0; z-index: 2; background: var(--panel); font-weight: 600;
        border-top: 1px solid var(--line);
      }
      .grid td.num { text-align: right; font-variant-numeric: tabular-nums; }
      .grid .rownum, .grid th.corner {
        position: sticky; left: 0; z-index: 1; width: 56px; max-width: 56px;
        background: var(--panel); color: #7a8590; border-left: 1px solid var(--line);
        text-align: right; font-variant-numeric: tabular-nums;
      }
      /* The top-left corner must beat both the sticky header and the sticky gutter. */
      .grid thead th.corner { z-index: 3; }
      .grid td.na { color: #c0c6cc; }
      /* editable data cells (double-click to edit → sparse override transform) */
      .grid td.cell { cursor: cell; }
      .grid td.cell:hover { background: #f0f6fc; }
      .cell-edit {
        width: 100%; box-sizing: border-box; font: inherit;
        border: 1px solid var(--accent); border-radius: 3px; padding: 1px 4px; margin: -2px 0;
      }
      /* virtualisation spacers: no border/padding; size set inline */
      .grid td.spacer { padding: 0; border: none; overflow: hidden; }
      .grid-empty { padding: 16px; color: #7a8590; }

      /* variable view — metadata table */
      .vargrid { border-collapse: collapse; width: 100%; font: 13px/1.4 system-ui, sans-serif; }
      .vargrid th, .vargrid td {
        border-bottom: 1px solid var(--line); padding: 6px 10px; text-align: left; vertical-align: top;
      }
      .vargrid thead th {
        position: sticky; top: 0; background: var(--panel);
        font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #7a8590;
      }
      .vargrid code { font: 12px ui-monospace, Menlo, monospace; color: #1a1a1a; }
      .vargrid__row { cursor: pointer; }
      .vargrid__row:hover { background: #eef5fb; }

      /* history / rewind panel */
      .ct-historyhost { padding: 4px 2px; }
      .history { list-style: none; margin: 0; padding: 0; font: 13px/1.4 system-ui, sans-serif; }
      .history__step { position: relative; display: flex; align-items: center; }
      /* connector line behind the markers (markers sit above it, opaque) */
      .history__step:not(:last-child)::before {
        content: ''; position: absolute; left: 20px; top: 19px; bottom: -1px;
        width: 2px; background: #e0e5eb; z-index: 0;
      }
      .history__btn {
        display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0;
        text-align: left; background: none; border: 0; cursor: pointer;
        padding: 7px 10px; border-radius: 6px; color: #1a1a1a; font: inherit;
      }
      /* per-step controls: move up/down, delete */
      .history__ctl { display: flex; gap: 1px; flex: none; padding-right: 4px; opacity: 0; transition: opacity .1s; }
      .history__step:hover .history__ctl { opacity: 1; }
      .history__ctlbtn {
        border: 0; background: none; cursor: pointer; color: #8a94a0; font-size: 12px;
        width: 20px; height: 22px; border-radius: 4px; line-height: 1;
      }
      .history__ctlbtn:hover:not(:disabled) { background: #e3e8ee; color: #1a1a1a; }
      .history__ctlbtn:disabled { opacity: .25; cursor: default; }
      /* floating History panel (Edit ▸ History…) — non-blocking, grid stays live */
      .history-panel {
        position: fixed; top: 52px; right: 12px; bottom: 12px; width: 340px; z-index: 50;
        background: var(--panel, #fff); border: 1px solid var(--line); border-radius: 10px;
        box-shadow: 0 12px 40px rgba(0,0,0,.22); display: flex; flex-direction: column; overflow: hidden;
      }
      .history-panel[hidden] { display: none; }
      .history-panel__head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 12px; border-bottom: 1px solid var(--line);
      }
      .history-panel__title { font-weight: 700; font-size: 14px; }
      .history-panel__close { font-size: 13px; width: 24px; height: 24px; }
      .history-panel__toolbar { padding: 7px 12px; border-bottom: 1px solid var(--line); }
      .history-panel__action {
        font: inherit; font-size: 12px; padding: 5px 10px; cursor: pointer;
        background: #fff; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px;
      }
      .history-panel__action:hover { background: #f0f7ff; }
      .history-panel__err {
        background: #fdf3f2; color: #7a201a; font-size: 12px; padding: 7px 12px;
        border-bottom: 1px solid #f0d8d5;
      }
      .history-panel__content { flex: 1; overflow: auto; padding: 8px 6px; }
      .history__btn:hover:not(:disabled) { background: #eef5fb; }
      .history__btn:disabled { cursor: default; }
      .history__marker {
        position: relative; z-index: 1; flex: none; width: 22px; height: 22px;
        border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
        font-size: 12px; line-height: 1; background: #e3e8ee; color: #51606e;
      }
      .history__step--current > .history__btn > .history__marker { background: var(--accent); color: #fff; }
      .history__step--future > .history__btn { color: #9aa6b1; }
      .history__step--future > .history__btn > .history__marker { background: #f0f2f5; color: #b3bcc6; }
      .history__body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .history__title { font-weight: 600; }
      .history__detail { font-size: 12px; color: #7a8590; }
      .history__step--future .history__detail { color: #aeb7c0; }
      .history__badge {
        margin-left: auto; align-self: center; font-size: 11px; font-weight: 600;
        color: var(--accent); background: #eaf2fb; padding: 1px 8px; border-radius: 10px;
      }
      .history-hint { color: #7a8590; font-size: 13px; line-height: 1.5; padding: 4px 12px 0; max-width: 48ch; }

      /* variable metadata editor (recode) */
      .ct-edit { min-width: 380px; }
      .ct-field { display: flex; flex-direction: column; gap: 4px; margin: 0 0 12px; font-size: 13px; }
      .ct-field input, .ct-field select, .ct-field textarea {
        font: inherit; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px;
      }
      .ct-field textarea { resize: vertical; font: 12px ui-monospace, monospace; }
      .ct-row { display: flex; gap: 12px; }
      .ct-row .ct-field { flex: 1; }
      .ct-hint { color: #7a8590; font-weight: 400; font-size: 11px; }

      /* --- footer / status --- */
      footer {
        border-top: 1px solid var(--line); background: var(--panel);
        padding: 6px 12px; font-size: 12px; color: #5a6470;
      }
      .lib-status { margin-left: 16px; color: #7a8590; }

      /* dataset library modal: one row per saved entry */
      .ct-lib__list { max-height: 50vh; }
      .ct-lib__row {
        display: flex; align-items: center; gap: 12px;
        padding: 8px; border-radius: 6px;
      }
      .ct-lib__row:hover { background: #f0f3f6; }
      .ct-lib__info { flex: 1; min-width: 0; }
      .ct-lib__name { font-weight: 600; }
      .ct-lib__meta { font-size: 12px; color: #7a8590; }
      .ct-lib__actions { display: flex; gap: 6px; flex: none; }
      .ct-lib__actions button {
        font: inherit; font-size: 13px; padding: 5px 12px;
        border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer;
      }
      .ct-lib__delete { color: #b03030; }
      .ct-lib__delete:hover { background: #fbeaea; }

      /* --- analysis dialogs (rendered by plugins) --- */
      .ct-dialog {
        border: 1px solid var(--line); border-radius: 10px; padding: 0;
        box-shadow: 0 16px 48px rgba(0,0,0,.25); max-width: 420px; width: 92vw;
      }
      .ct-dialog::backdrop { background: rgba(0,0,0,.35); }
      .ct-dialog--wide { max-width: 640px; }

      /* join review dialog */
      .ct-join__keys { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 0 0 12px; }
      .ct-join__keys select { font: inherit; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; }
      .ct-join__summary { margin: 0 0 10px; font-size: 13px; color: #5a6470; }
      .ct-join__cols { display: flex; gap: 12px; }
      .ct-join__side { flex: 1; min-width: 0; }
      .ct-join__side-head { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7a8590; margin: 0 0 4px; }
      .ct-join__list {
        list-style: none; margin: 0; padding: 4px; height: 30vh; overflow-y: auto;
        border: 1px solid var(--line); border-radius: 6px;
      }
      .ct-join__list li { padding: 5px 8px; border-radius: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .ct-join__list li:hover { background: #f0f3f6; }
      .ct-join__list li.sel { background: #e6f0fa; outline: 1px solid var(--accent); }
      .ct-join__pair {
        margin: 10px 0; font: inherit; font-size: 13px; padding: 6px 12px;
        border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer;
      }
      .ct-join__pair:disabled { opacity: .5; cursor: default; }
      .ct-join__manual-head { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7a8590; margin: 4px 0; }
      .ct-join__manual-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 2px 0; }
      .ct-join__manual-row button { border: 0; background: none; cursor: pointer; color: #b03030; font-size: 13px; }
      .ct-dialog__form { padding: 20px; }
      .ct-dialog__title { margin: 0 0 4px; font-size: 18px; }
      .ct-dialog__hint { margin: 0 0 12px; color: #5a6470; }
      /* Plain bulleted list inside a dialog (e.g. the missing-plugins warning). */
      .ct-dialog__list { margin: 0 0 16px; padding: 0 0 0 20px; max-height: 40vh; overflow-y: auto; }
      .ct-dialog__list li { margin: 0 0 6px; line-height: 1.4; }
      .ct-dialog__vars { list-style: none; margin: 0 0 16px; padding: 0; max-height: 40vh; overflow-y: auto; }
      .ct-dialog__vars label {
        display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer;
      }
      .ct-dialog__vars label:hover { background: #f0f3f6; }
      /* group label inside the picker ("Selected" / "All variables") */
      .ct-dialog__vars li.ct-dialog__group {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: #7a8590; padding: 10px 8px 2px; pointer-events: none;
      }
      .ct-dialog__vars li.ct-dialog__group + li label { border-top: 0; }
      .ct-dialog__vars code { color: #7a8590; font-size: 12px; }
      /* A variable disabled because a prior `unique` input already took it. */
      .ct-dialog__vars li.ct-dialog__excluded label { opacity: .5; cursor: not-allowed; }
      .ct-dialog__taken { margin-left: auto; font-size: 11px; color: #b07; font-style: italic; }
      .ct-dialog__buttons { display: flex; justify-content: flex-end; gap: 8px; margin: 0; padding: 0; }
      .ct-dialog__buttons button {
        font: inherit; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--line);
        background: #fff; cursor: pointer;
      }
      /* Specificity must beat `.ct-dialog__buttons button` (0,1,1) above, else the
         white base background wins and leaves white text on white. */
      .ct-dialog__buttons .ct-dialog__primary {
        background: var(--accent); color: #fff; border-color: var(--accent);
      }
      /* Destructive choice (e.g. "Delete data and remove from project", #118). */
      .ct-dialog__buttons .ct-dialog__danger {
        background: #fff; color: #c0392b; border-color: #e3b4ad;
      }
      /* Stacked, full-width choices for a multi-option prompt (most-recommended
         first, top-to-bottom) rather than a right-aligned row. */
      .ct-dialog__buttons--stack { flex-direction: column; align-items: stretch; gap: 8px; }
      .ct-dialog__buttons--stack button { text-align: center; }
      /* Labelled select rows (e.g. the dataset-join key/type chooser, #121). */
      .ct-dialog__row { display: flex; flex-direction: column; gap: 4px; margin: 0 0 12px; font-size: 13px; }
      .ct-dialog__row > span { color: #555; }
      .ct-dialog__row select {
        font: inherit; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff;
      }
      /* Unified Import data… / Export data… format picker */
      .ct-fmt__search {
        width: 100%; box-sizing: border-box; font: inherit; padding: 8px 10px;
        border: 1px solid var(--line); border-radius: 6px; margin: 0 0 10px;
      }
      .ct-fmt__list { max-height: 50vh; overflow-y: auto; margin: 0 0 16px; }
      .ct-fmt__group {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: #7a8590; padding: 10px 4px 4px;
      }
      .ct-fmt__row {
        display: flex; align-items: baseline; gap: 10px; width: 100%; text-align: left;
        font: inherit; padding: 9px 10px; border: 0; border-radius: 6px;
        background: transparent; cursor: pointer;
      }
      .ct-fmt__row:hover, .ct-fmt__row:focus-visible { background: #eef5fb; outline: none; }
      .ct-fmt__name { flex: 0 1 auto; }
      .ct-fmt__ext { margin-left: auto; color: #7a8590; font-size: 12px; white-space: nowrap; }
      .ct-fmt__empty { color: #7a8590; padding: 16px 4px; }
      /* "Export as" filename dialog */
      .ct-saveas { max-width: 420px; }
      .ct-saveas__field {
        display: flex; align-items: stretch; border: 1px solid var(--line);
        border-radius: 6px; overflow: hidden; background: #fff;
      }
      .ct-saveas__field:focus-within { border-color: var(--accent); }
      .ct-saveas__name {
        flex: 1 1 auto; min-width: 0; font: inherit; padding: 8px 10px;
        border: 0; outline: none; background: transparent;
      }
      .ct-saveas__ext {
        flex: 0 0 auto; align-self: center; padding: 0 10px 0 4px;
        color: #7a8590; font-size: 13px; white-space: nowrap;
      }
      /* Plugin manager dialog */
      .ct-plugins__add { display: flex; gap: 8px; margin: 0 0 8px; }
      .ct-plugins__addbtn {
        font: inherit; font-size: 13px; padding: 6px 12px; cursor: pointer;
        background: #fff; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px;
      }
      .ct-plugins__addbtn:hover { background: #f0f7ff; }
      .ct-plugins__urlinput {
        width: 100%; box-sizing: border-box; font: inherit; margin: 0 0 4px;
        padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px;
      }
      .ct-plugins__err {
        background: #fdf3f2; color: #7a201a; font-size: 12px; padding: 7px 10px;
        border: 1px solid #f0d8d5; border-radius: 6px; margin: 0 0 8px;
      }
      .ct-plugin__right { display: flex; align-items: center; gap: 8px; flex: none; }
      .ct-plugin__rm {
        border: 0; background: none; color: #b3424a; cursor: pointer; font-size: 13px;
        width: 22px; height: 22px; border-radius: 4px; line-height: 1;
      }
      .ct-plugin__rm:hover { background: #fdecec; }
      .ct-plugin__edit {
        border: 0; background: none; color: var(--accent); cursor: pointer; font-size: 13px;
        width: 22px; height: 22px; border-radius: 4px; line-height: 1;
      }
      .ct-plugin__edit:hover { background: #eaf3fb; }
      .ct-plugin__fork {
        border: 0; background: none; color: #6b7480; cursor: pointer; font-size: 13px;
        width: 22px; height: 22px; border-radius: 4px; line-height: 1;
      }
      .ct-plugin__fork:hover { background: #eef1f4; color: #3a424c; }
      .ct-plugin__export {
        border: 0; background: none; color: #6b7480; cursor: pointer; font-size: 13px;
        width: 22px; height: 22px; border-radius: 4px; line-height: 1;
      }
      .ct-plugin__export:hover { background: #eef1f4; color: #3a424c; }
      .ct-plugin__web {
        border: 0; background: none; cursor: pointer; font-size: 12px;
        width: 22px; height: 22px; border-radius: 4px; line-height: 1; filter: grayscale(0.2);
      }
      .ct-plugin__web:hover { background: #fdecec; }

      /* Plugin creator dialog */
      .ct-creator { max-width: 760px; width: 90vw; }
      .ct-creator__row { margin: 0 0 8px; }
      /* Simple/Code mode toggle */
      .ct-creator__modes { display: inline-flex; gap: 0; margin: 0 0 12px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
      .ct-creator__mode { font: inherit; font-size: 13px; padding: 5px 14px; cursor: pointer; background: #fff; border: 0; border-right: 1px solid var(--line); color: #555; }
      .ct-creator__mode:last-child { border-right: 0; }
      .ct-creator__mode.is-active { background: var(--accent); color: #fff; }
      /* Simple-mode form */
      .ct-creator__field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #333; margin: 0 0 12px; }
      .ct-creator__cat, .ct-creator__name { font: inherit; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px; max-width: 340px; }
      .ct-creator__inputs { display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
      .ct-creator__inputrow { display: flex; gap: 6px; align-items: center; }
      .ct-creator__inname { font: inherit; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; width: 130px; }
      .ct-creator__inkind { font: inherit; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; flex: 1; }
      .ct-creator__inopt { font-size: 12px; color: #555; white-space: nowrap; display: inline-flex; align-items: center; gap: 3px; }
      .ct-creator__inrm { border: 0; background: none; color: #b3424a; cursor: pointer; font-size: 13px; }
      .ct-creator__addinput, .ct-creator__tpl { font: inherit; font-size: 12px; padding: 5px 11px; cursor: pointer; background: #f4f7fb; border: 1px solid var(--line); border-radius: 999px; align-self: flex-start; margin-top: 4px; }
      .ct-creator__addinput:hover { background: #e8f1fb; border-color: var(--accent); }
      .ct-creator__radio { font-size: 13px; margin-right: 14px; display: inline-flex; align-items: center; gap: 4px; }
      .ct-creator__r { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; line-height: 1.5; min-height: 130px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; resize: vertical; white-space: pre; }
      .ct-creator__rhint { font-size: 12px; color: #777; margin: 4px 0 0; }
      .ct-creator__namelbl {
        font-size: 13px; color: #333; display: flex; flex-direction: column; gap: 4px; max-width: 340px;
      }
      .ct-creator__name {
        font: inherit; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px;
      }
      .ct-creator__templates { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px; }
      .ct-creator__tpl {
        font: inherit; font-size: 12px; padding: 5px 11px; cursor: pointer;
        background: #f4f7fb; border: 1px solid var(--line); border-radius: 999px;
      }
      .ct-creator__tpl:hover { background: #e8f1fb; border-color: var(--accent); }
      .ct-creator__editor {
        display: flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
        height: 360px; background: #fbfcfd;
      }
      .ct-creator__gutter {
        flex: none; width: 40px; padding: 8px 6px; text-align: right; color: #9aa6b2;
        background: #f1f4f7; border-right: 1px solid var(--line);
        font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; line-height: 1.5;
        white-space: pre; overflow: hidden; user-select: none;
      }
      .ct-creator__code {
        flex: 1; border: 0; resize: none; padding: 8px 10px; outline: none; background: transparent;
        color: #1d2733; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px;
        line-height: 1.5; white-space: pre; tab-size: 2;
      }
      .ct-creator__status {
        margin: 8px 0 0; font-size: 12px; padding: 7px 10px; border-radius: 6px;
        background: #eef7ee; color: #1e5b2a; border: 1px solid #cfe6cf;
      }
      .ct-creator__status--err { background: #fdf3f2; color: #7a201a; border-color: #f0d8d5; }
      .ct-plugins__search {
        width: 100%; box-sizing: border-box; font: inherit; margin: 0 0 8px;
        padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px;
      }
      /* discipline filter row (pin plugins a field recommends to the top) */
      .ct-plugins__filters { display: flex; gap: 8px; margin: 0 0 8px; }
      .ct-plugins__filters .ct-plugins__search { margin: 0; flex: 1; width: auto; }
      .ct-plugins__discipline {
        font: inherit; padding: 7px 8px; border: 1px solid var(--line); border-radius: 6px;
        flex: none; max-width: 48%;
      }
      .ct-plugins__section {
        font-size: 12px; font-weight: 700; color: #41505e;
        padding: 12px 2px 4px; border-top: 1px solid var(--line); margin: 8px 0 2px;
      }
      .ct-plugins { max-height: 320px; overflow: auto; }
      .ct-plugins__cat {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7a8590;
        font-weight: 700; padding: 10px 2px 3px; position: sticky; top: 0; background: var(--panel, #fff);
      }
      .ct-plugins__list { list-style: none; margin: 0; padding: 0; }
      .ct-plugins__empty { color: #7a8590; padding: 12px 2px; }
      .ct-plugin {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 7px 4px; border-bottom: 1px solid var(--line);
      }
      .ct-plugin__main { display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 14px; }
      .ct-plugin__name { color: #1a1a1a; }
      .ct-plugin__ver { font: 11px ui-monospace, Menlo, monospace; color: #6b7682; background: #eef1f4; border-radius: 4px; padding: 0 5px; flex: none; }
      .ct-plugin__meta { font: 11px ui-monospace, Menlo, monospace; color: #8a94a0; }

      /* Compute / Recode dialogs */
      .ct-cr__expr { font: 12px ui-monospace, Menlo, monospace; resize: vertical; }
      .ct-cr__palette { display: flex; flex-wrap: wrap; gap: 4px; margin: 0 0 6px; max-height: 96px; overflow: auto; }
      .ct-cr__chip {
        font: 11px ui-monospace, Menlo, monospace; padding: 2px 8px; cursor: pointer;
        background: #eef5fb; border: 1px solid var(--line); border-radius: 10px; color: #1a4a73;
      }
      .ct-cr__chip:hover { background: #dcebfa; }
      .ct-cr__ruleshead, .ct-cr__rule, .ct-cr__else {
        display: grid; grid-template-columns: 90px 1fr 18px minmax(150px, 1fr) 24px;
        gap: 8px; align-items: center; margin: 4px 0;
      }
      .ct-cr__ruleshead { color: #7a8590; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; margin-top: 8px; }
      .ct-cr__else { grid-template-columns: auto minmax(150px, 1fr); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--line); }
      .ct-cr__elselabel { color: #5a6470; font-size: 13px; }
      .ct-cr__frominputs { display: flex; gap: 4px; align-items: center; min-width: 0; }
      .ct-cr__frominputs input, .ct-cr .ct-cr__to input, .ct-cr select {
        font: inherit; padding: 4px 6px; border: 1px solid var(--line); border-radius: 5px; min-width: 0;
      }
      .ct-cr__frominputs input { flex: 1; }
      .ct-cr__to { display: flex; gap: 4px; }
      .ct-cr__to select { flex: none; }
      .ct-cr__to input { flex: 1; }
      .ct-cr__arrow { color: #7a8590; text-align: center; }
      .ct-cr__rm { border: 0; background: none; color: #b3424a; cursor: pointer; font-size: 14px; padding: 0; }
      .ct-cr__addrule { font: inherit; font-size: 13px; background: none; border: 1px dashed var(--line); border-radius: 6px; padding: 5px 10px; cursor: pointer; color: var(--accent); margin-top: 4px; }
      .ct-cr__addrule:hover { background: #f0f7ff; }

      /* Export-output dialog uses .ct-dialog--wide (640px) so the four actions sit
         on one row; wrap is a fallback on very narrow viewports. Cancel sits apart
         on the left, the save actions on the right. */
      .ct-export__buttons { flex-wrap: wrap; }
      .ct-export__buttons button { white-space: nowrap; }
      .ct-export__buttons button[value="cancel"] { margin-right: auto; }

      /* --- busy indicator --- */
      /* A non-blocking "working" pill, shown while WebR is running a job (the
         slow path: package installs, file reads, analyses). pointer-events:none
         so it never traps clicks. */
      .busy {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        display: flex; align-items: center; gap: 10px;
        background: var(--bar); color: var(--bar-fg);
        padding: 8px 16px; border-radius: 999px;
        box-shadow: 0 2px 10px rgba(0,0,0,.28);
        font-size: 13px; z-index: 1000; pointer-events: none;
      }
      .busy[hidden] { display: none; }
      .busy__spinner {
        width: 14px; height: 14px; border-radius: 50%; flex: none;
        border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
        animation: busy-spin .7s linear infinite;
      }
      @keyframes busy-spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div class="busy" id="busy" role="status" aria-live="polite" hidden>
      <span class="busy__spinner" aria-hidden="true"></span>
      <span class="busy__text">Working…</span>
    </div>

    <header>
      <span class="brand">CrossTab</span>
      <nav class="menubar" id="menubar" aria-label="Main menu"></nav>
    </header>

    <main>
      <aside class="sidebar" id="sidebar" aria-label="Variables"></aside>
      <section class="workspace">
        <div class="tabs" id="tabs" role="tablist" aria-label="Workspace views">
          <button class="tab" id="tab-data" role="tab" data-view="data">Data</button>
          <button class="tab" id="tab-vars" role="tab" data-view="vars">Variables</button>
          <button class="tab" id="tab-output" role="tab" data-view="output" aria-selected="true">Output</button>
          <button class="tab" id="tab-console" role="tab" data-view="console">R Console</button>
          <button class="tab-action" id="clear-output" type="button" title="Clear all output">Clear output</button>
        </div>
        <div class="view" id="view-data" role="tabpanel" aria-label="Data" hidden></div>
        <div class="view" id="view-vars" role="tabpanel" aria-label="Variables" hidden></div>
        <section class="view results" id="results" role="tabpanel" aria-label="Output" aria-live="polite"></section>
        <div class="view" id="view-console" role="tabpanel" aria-label="R Console" hidden></div>
      </section>
    </main>

    <footer><span id="status">Starting…</span></footer>

    <script type="module">
      import { boot } from './core/app.js';

      boot({
        menubar: document.getElementById('menubar'),
        sidebar: document.getElementById('sidebar'),
        results: document.getElementById('results'),
        status: document.getElementById('status'),
        busy: document.getElementById('busy'),
        tabs: document.getElementById('tabs'),
        viewData: document.getElementById('view-data'),
        viewVars: document.getElementById('view-vars'),
        viewConsole: document.getElementById('view-console'),
      }).catch((err) => {
        console.error('CrossTab failed to start', err);
        document.getElementById('status').textContent = 'Failed to start: ' + err.message;
      });
    </script>
  </body>
</html>
